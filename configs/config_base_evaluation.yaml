# lightning.pytorch==2.5.5
seed_everything: true
trainer:
  evaluate_correctness: false
  evaluator_model_name: Qwen/Qwen3.5-9B
  evaluator_batch_size: 1
  accelerator: "gpu"
  strategy: auto
  devices: [1]
  num_nodes: 1
  precision: null
  logger: null
  callbacks: null
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: null
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
  model_registry: null
model:
  class_path: callm.models.EvaluatorModule
  init_args:
    model_name: ${trainer.evaluator_model_name}
    hf_token: null
    flush_outputs_every_n_steps: 300
    save_outputs: false
    resume_from: ${resume_from}
    max_new_tokens: 10
data:
  class_path: callm.data.EvaluatorDataModule
  init_args:
    batch_size: ${trainer.evaluator_batch_size}
    model_name: ${trainer.evaluator_model_name}
    llm_outputs_path: ${llm_outputs_path}
    num_workers: ${num_workers}
    max_length: 553
    resume_from: ${resume_from}

num_workers: 24
optimizer: null
lr_scheduler: null
llm_outputs_path: /home/eernst/callm/lightning_logs/verbalized_Qwen3.5-9B/llm_outputs.csv
resume_from: null
